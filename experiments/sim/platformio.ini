; Desktop LVGL simulator — renders the SHARED ui/ module headless to PNGs.
; Lets us validate UI changes without flashing the device.
; Build: gcc must be on PATH (install via scoop: `scoop install gcc`, then add its bin to PATH).
;   pio run -d experiments/sim
;   .pio/build/sim/program.exe <output_dir>

[env:sim]
platform = native
build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -I ../../firmware/include
lib_ldf_mode = deep+
lib_deps =
    lvgl/lvgl@9.3.0                  ; LVGL v9 (registry; was vendored under docs/demo)
    symlink://../../ui
