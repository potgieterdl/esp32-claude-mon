; ============================================================
; DE-RISK EXPERIMENT — run lcars-esp32 (TFT_eSPI) on our C6 board.
; Throwaway: proves the engine renders on ESP32-C6 + ST7789V2 240x280
; before we commit to TFT_eSPI as the stack. Not our clean firmware.
;
; Builds the vendor hello_lcars example (src_dir below) unmodified.
; Engine forces setRotation(3) => landscape, so SCR is 280x240.
; ============================================================

[platformio]
src_dir = ../../vendor/lcars-esp32/examples/hello_lcars/src

[env:esp32-c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    symlink://../../vendor/lcars-esp32

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DDISABLE_ALL_LIBRARY_WARNINGS
    ; --- LCARS engine canvas (rotation 3 => landscape) ---
    -DSCR_WIDTH=280
    -DSCR_HEIGHT=240
    ; --- TFT_eSPI: ST7789V2 on our pins ---
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DCGRAM_OFFSET
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DTFT_MOSI=2
    -DTFT_SCLK=1
    -DTFT_CS=5
    -DTFT_DC=3
    -DTFT_RST=4
    -DTFT_BL=6
    -DTFT_MISO=-1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000
    ; --- TFT_eSPI font loading (engine uses SMOOTH_FONT/VLW) ---
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_GFXFF
    -DSMOOTH_FONT
