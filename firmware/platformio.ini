; ESP32-C6-Touch-LCD-1.69 — Claude usage monitor (LVGL v9)
;
; Display: ST7789V2 via LovyanGFX (async GDMA SPI). Touch: CST816T via SensorLib. LVGL v9.
; (TFT_eSPI is NOT C6-compatible — see docs/ARCHITECTURE.md.)
; All libraries come from the PlatformIO registry (lvgl 9.3.0 + SensorLib 0.3.1 = the versions
; Waveshare ships). docs/demo/ + vendor/ are optional local reference, NOT required to build.

[env:esp32-c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv   ; 8MB layout: two ~3.3MB app slots (OTA-ready) + littlefs

extra_scripts = pre:load_config.py         ; injects ../config.json -> CFG_* build defines (replaces wifi_config.h)

monitor_speed = 115200
upload_port = COM3
monitor_port = COM3

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE          ; LVGL picks up include/lv_conf.h
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -I include

lib_deps =
    lvgl/lvgl@9.3.0                                   ; LVGL v9 (registry; was vendored under docs/demo)
    moononournation/GFX Library for Arduino@^1.4.9   ; registry build is C6-compatible (bundled one isn't)
    lewisxhe/SensorLib@0.3.1                          ; CST816 touch + PCF85063 RTC drivers (registry)
    symlink://../ui
    bblanchon/ArduinoJson@^7
    ayushsharma82/ElegantOTA@^3   ; OTA via the built-in WebServer (sync mode = default)
    lovyan03/LovyanGFX@^1.2.0      ; async GDMA SPI for the display (smoother than Arduino_GFX blocking flush)
