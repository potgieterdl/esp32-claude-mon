services:
  claude-usage-proxy:
    build: .
    image: claude-usage-proxy:latest
    container_name: claude-usage-proxy
    restart: unless-stopped
    ports:
      - "7890:8080"          # LAN: http://<server-ip>:7890/usage  (host 7890 -> container 8080)
    environment:
      CONFIG_FILE: /app/config.json
    volumes:
      # The single project config.json (repo root, one level up). The proxy reads its `proxy`
      # section (token / session_key / poll_seconds). Refresh the session key by editing this
      # file + `docker compose restart` — no rebuild. (Env vars still override if you set them.)
      - ../config.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
